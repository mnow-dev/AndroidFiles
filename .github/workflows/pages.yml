name: Deploy website

on:
  push:
    branches: [main]
    paths: ['docs/**']
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    # Requires Pages to be enabled (Settings → Pages → Source: GitHub Actions).
    # On the free plan this only works once the repository is public — the
    # job skips itself while the repo is private instead of failing red.
    if: ${{ !github.event.repository.private }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
